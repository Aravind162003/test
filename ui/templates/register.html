<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Secure Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-lg p-5 glass-card" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Create Account</h3>
            <p class="text-muted small">Join the Energy-Aware Secure Vault</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2 border-0 rounded-3 shadow-sm">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="/register">
            <div class="form-floating mb-3">
                <input type="text" name="name" class="form-control rounded-3" id="floatingName" placeholder="John Doe" required>
                <label for="floatingName"><i class="fa-solid fa-id-card me-2 text-muted"></i>Full Name</label>
            </div>
            <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control rounded-3" id="floatingEmail" placeholder="name@example.com" required>
                <label for="floatingEmail"><i class="fa-solid fa-envelope me-2 text-muted"></i>Email Address</label>
            </div>
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control rounded-3" id="floatingUser" placeholder="Username" required>
                <label for="floatingUser"><i class="fa-solid fa-user me-2 text-muted"></i>Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control rounded-3" id="floatingPassword" placeholder="Password" required>
                <label for="floatingPassword"><i class="fa-solid fa-lock me-2 text-muted"></i>Password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 rounded-3 shadow-sm">
                Register Securely <i class="fa-solid fa-user-plus ms-2"></i>
            </button>
            <div class="text-center mt-3">
                <a href="/login" class="text-decoration-none text-muted">Already have an account? Log in here.</a>
            </div>
        </form>
    </div>
</body>
</html>
