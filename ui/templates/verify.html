<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | Secure Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-lg p-5 glass-card" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <div class="bg-warning text-dark rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-key fs-3"></i>
            </div>
            <h3 class="fw-bold text-dark">Security Check</h3>
            <p class="text-muted small">Enter the 6-digit OTP sent to your email to decrypt <b>{{ filename }}</b>.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2 border-0 rounded-3 shadow-sm">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="/verify/{{ file_id }}">
            <div class="form-floating mb-4">
                <input type="text" name="otp_code" class="form-control rounded-3 text-center fs-4 fw-bold" placeholder="000000" maxlength="6" required autocomplete="off">
                <label><i class="fa-solid fa-shield-halved me-2 text-muted"></i>One-Time Password</label>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold py-3 rounded-3 shadow-sm">
                Verify & Decrypt File <i class="fa-solid fa-unlock ms-2"></i>
            </button>
            <a href="/dashboard" class="btn btn-link w-100 mt-2 text-muted text-decoration-none">Cancel & Return</a>
        </form>
    </div>
</body>
</html>
