<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Cloud | Authenticate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-lg p-5 glass-card" style="width: 100%; max-width: 420px;">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-shield-halved fs-3"></i>
            </div>
            <h3 class="fw-bold text-dark">Secure Vault</h3>
            <p class="text-muted small">Energy-Aware Cloud Encryption</p>
        </div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger py-2 border-0 rounded-3 shadow-sm">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control rounded-3" placeholder="Username" required>
                <label><i class="fa-solid fa-user me-2 text-muted"></i>Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control rounded-3" placeholder="Password" required>
                <label><i class="fa-solid fa-lock me-2 text-muted"></i>Password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 rounded-3 shadow-sm">
                Authenticate & Enter <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted mb-1">Don't have an account?</p>
            <a href="/register" class="btn btn-outline-primary rounded-pill px-4 fw-bold">Create an Account</a>
        </div>
    </div>
</body>
</html>
